<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
  <!-- Nebraska State Seal — wireframe -->
  <!-- Outer border rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <!-- State name arc text (top) -->
  <path id="ne-top-arc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="serif" font-size="12" fill="#22c55e" letter-spacing="2">
    <textPath href="#ne-top-arc" startOffset="8%">THE GREAT SEAL OF THE</textPath>
  </text>
  <path id="ne-bot-arc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
  <text font-family="serif" font-size="13" fill="#22c55e" letter-spacing="2">
    <textPath href="#ne-bot-arc" startOffset="18%">STATE OF NEBRASKA</textPath>
  </text>

  <!-- Rocky Mountains (background) -->
  <polyline points="60,104 72,84 84,104 94,76 106,104 118,86 130,104 142,90 152,104" fill="none" stroke="#22c55e" stroke-width="1.2"/>

  <!-- Missouri River (water lines) -->
  <path d="M 60,118 Q 80,112 100,118 Q 120,124 140,118" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 64,122 Q 84,116 100,122 Q 116,128 136,122" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Steamboat on river -->
  <rect x="88" y="112" width="24" height="8" rx="2" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="94" y1="104" x2="94" y2="112" stroke="#22c55e" stroke-width="1"/>
  <line x1="100" y1="102" x2="100" y2="112" stroke="#22c55e" stroke-width="1"/>
  <path d="M 92,104 Q 90,100 93,98" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <path d="M 100,102 Q 98,98 101,96" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Blacksmith / settler (labor symbol) -->
  <circle cx="72" cy="92" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="72" y1="97" x2="72" y2="114" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="64" y1="104" x2="80" y2="104" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="72" y1="114" x2="66" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="72" y1="114" x2="78" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Hammer -->
  <line x1="80" y1="98" x2="64" y2="110" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="78" y="95" width="6" height="4" rx="1" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Cabin / settler's cabin (frontier symbol) -->
  <rect x="60" y="106" width="16" height="10" fill="none" stroke="#22c55e" stroke-width="1"/>
  <polyline points="60,106 68,98 76,106" fill="none" stroke="#22c55e" stroke-width="1"/>
  <!-- Door -->
  <rect x="65" y="110" width="6" height="6" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Train (railroad - important to Nebraska history) -->
  <rect x="112" y="96" width="32" height="10" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Engine -->
  <rect x="108" y="94" width="12" height="12" rx="1" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="116" cy="109" r="3" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <circle cx="126" cy="109" r="3" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <circle cx="136" cy="109" r="3" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Smokestack -->
  <line x1="112" y1="88" x2="112" y2="94" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M 110,88 Q 112,84 114,88" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Rails -->
  <line x1="106" y1="112" x2="146" y2="112" stroke="#22c55e" stroke-width="1"/>

  <!-- Motto banner -->
  <path d="M 62,136 Q 100,146 138,136" fill="none" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="144" font-family="serif" font-size="8" text-anchor="middle" fill="#22c55e" letter-spacing="1">EQUALITY BEFORE THE LAW</text>

  <!-- Sun rising over mountains (top center) -->
  <circle cx="100" cy="80" r="8" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="100" y1="68" x2="100" y2="64" stroke="#22c55e" stroke-width="1"/>
  <line x1="108" y1="72" x2="112" y2="68" stroke="#22c55e" stroke-width="1"/>
  <line x1="112" y1="80" x2="116" y2="80" stroke="#22c55e" stroke-width="1"/>
  <line x1="92" y1="72" x2="88" y2="68" stroke="#22c55e" stroke-width="1"/>
  <line x1="88" y1="80" x2="84" y2="80" stroke="#22c55e" stroke-width="1"/>

  <!-- Year -->
  <text x="100" y="160" font-family="serif" font-size="9" text-anchor="middle" fill="#22c55e">1867</text>
</svg>
