<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
  <!-- Pennsylvania State Seal — wireframe -->
  <!-- Outer border rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <!-- State name arc text (top) -->
  <path id="pa-top-arc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="serif" font-size="12" fill="#22c55e" letter-spacing="2">
    <textPath href="#pa-top-arc" startOffset="8%">COMMONWEALTH OF</textPath>
  </text>
  <path id="pa-bot-arc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
  <text font-family="serif" font-size="13" fill="#22c55e" letter-spacing="2">
    <textPath href="#pa-bot-arc" startOffset="15%">PENNSYLVANIA</textPath>
  </text>

  <!-- Central keystone shape -->
  <polygon points="100,78 116,84 116,108 100,114 84,108 84,84" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Inner keystone (smaller) -->
  <polygon points="100,82 112,87 112,106 100,111 88,106 88,87" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Shield (coat of arms) -->
  <path d="M 80,88 L 120,88 L 120,118 Q 100,130 80,118 Z" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Horizontal band dividing shield -->
  <line x1="80" y1="104" x2="120" y2="104" stroke="#22c55e" stroke-width="1"/>

  <!-- Upper shield: Ship (sailing vessel) -->
  <line x1="90" y1="90" x2="110" y2="90" stroke="#22c55e" stroke-width="1"/>
  <line x1="100" y1="88" x2="100" y2="96" stroke="#22c55e" stroke-width="1"/>
  <line x1="100" y1="90" x2="106" y2="93" stroke="#22c55e" stroke-width="1"/>
  <path d="M 88,90 Q 90,96 100,96 Q 110,96 112,90" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Lower shield: Plow -->
  <path d="M 84,114 L 92,108 L 116,108 L 116,112 L 92,112 L 88,118" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="89" cy="116" r="3" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="114" cy="116" r="3" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Eagle (top, supporter) -->
  <ellipse cx="100" cy="72" rx="7" ry="5" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 84,74 Q 90,68 100,70 Q 110,68 116,74" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 84,74 Q 78,78 74,76" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 116,74 Q 122,78 126,76" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="66" r="3" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="97" y1="68" x2="97" y2="72" stroke="#22c55e" stroke-width="0.8"/>
  <line x1="103" y1="68" x2="103" y2="72" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Horses (supporters, left and right) -->
  <!-- Left horse (simplified) -->
  <ellipse cx="66" cy="108" rx="8" ry="6" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="62" cy="103" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="62" y1="114" x2="60" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="66" y1="114" x2="64" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="70" y1="114" x2="72" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="74" y1="112" x2="76" y2="122" stroke="#22c55e" stroke-width="1"/>
  <!-- Right horse (simplified) -->
  <ellipse cx="134" cy="108" rx="8" ry="6" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="138" cy="103" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="128" y1="114" x2="126" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="132" y1="114" x2="130" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="136" y1="114" x2="138" y2="124" stroke="#22c55e" stroke-width="1"/>
  <line x1="140" y1="112" x2="142" y2="122" stroke="#22c55e" stroke-width="1"/>

  <!-- Motto banner -->
  <path d="M 68,134 Q 100,144 132,134" fill="none" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="142" font-family="serif" font-size="9" text-anchor="middle" fill="#22c55e" letter-spacing="1">VIRTUE · LIBERTY · INDEPENDENCE</text>

  <!-- Year -->
  <text x="100" y="160" font-family="serif" font-size="9" text-anchor="middle" fill="#22c55e">1787</text>
</svg>
