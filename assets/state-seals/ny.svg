<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
  <!-- New York State Seal — wireframe -->
  <!-- Outer border rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <!-- State name arc text (top) -->
  <path id="ny-top-arc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="serif" font-size="13" fill="#22c55e" letter-spacing="2">
    <textPath href="#ny-top-arc" startOffset="8%">THE GREAT SEAL OF THE</textPath>
  </text>
  <path id="ny-bot-arc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
  <text font-family="serif" font-size="14" fill="#22c55e" letter-spacing="3">
    <textPath href="#ny-bot-arc" startOffset="21%">STATE OF NEW YORK</textPath>
  </text>

  <!-- Central shield -->
  <path d="M 78,82 L 122,82 L 122,118 Q 100,132 78,118 Z" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Hudson Highlands / mountains on shield -->
  <polyline points="82,116 90,102 98,116 106,95 114,116 118,116" fill="none" stroke="#22c55e" stroke-width="1"/>
  <!-- Sun rising over mountains on shield -->
  <circle cx="100" cy="89" r="6" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="100" y1="81" x2="100" y2="78" stroke="#22c55e" stroke-width="1"/>
  <line x1="106" y1="84" x2="109" y2="82" stroke="#22c55e" stroke-width="1"/>
  <line x1="94" y1="84" x2="91" y2="82" stroke="#22c55e" stroke-width="1"/>

  <!-- Ships on water (3 masted sailing ships, simplified) -->
  <line x1="84" y1="110" x2="96" y2="110" stroke="#22c55e" stroke-width="1"/>
  <line x1="90" y1="100" x2="90" y2="110" stroke="#22c55e" stroke-width="1"/>
  <line x1="90" y1="103" x2="96" y2="106" stroke="#22c55e" stroke-width="1"/>
  <line x1="104" y1="110" x2="116" y2="110" stroke="#22c55e" stroke-width="1"/>
  <line x1="110" y1="100" x2="110" y2="110" stroke="#22c55e" stroke-width="1"/>
  <line x1="110" y1="103" x2="116" y2="106" stroke="#22c55e" stroke-width="1"/>

  <!-- Liberty figure (left supporter) -->
  <circle cx="66" cy="86" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="66" y1="91" x2="66" y2="112" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="58" y1="98" x2="74" y2="98" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="66" y1="112" x2="60" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="66" y1="112" x2="72" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Liberty cap on pole -->
  <line x1="58" y1="84" x2="58" y2="122" stroke="#22c55e" stroke-width="1"/>
  <ellipse cx="58" cy="81" rx="4" ry="3" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Justice figure (right supporter) -->
  <circle cx="134" cy="86" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="134" y1="91" x2="134" y2="112" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="126" y1="98" x2="142" y2="98" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="134" y1="112" x2="128" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="134" y1="112" x2="140" y2="122" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Scales of justice -->
  <line x1="142" y1="84" x2="142" y2="122" stroke="#22c55e" stroke-width="1"/>
  <line x1="136" y1="88" x2="148" y2="88" stroke="#22c55e" stroke-width="1"/>
  <circle cx="136" cy="92" r="3" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <circle cx="148" cy="92" r="3" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Eagle (top) -->
  <ellipse cx="100" cy="70" rx="6" ry="4" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 86,72 Q 90,66 100,68 Q 110,66 114,72" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 86,72 Q 80,76 76,74" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 114,72 Q 120,76 124,74" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 94,68 Q 100,60 106,68" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Globe under eagle -->
  <circle cx="100" cy="74" r="4" fill="none" stroke="#22c55e" stroke-width="0.8"/>

  <!-- EXCELSIOR motto banner -->
  <path d="M 72,136 Q 100,144 128,136" fill="none" stroke="#22c55e" stroke-width="1"/>
  <text x="100" y="142" font-family="serif" font-size="11" text-anchor="middle" fill="#22c55e" letter-spacing="3">EXCELSIOR</text>

  <!-- Year -->
  <text x="100" y="160" font-family="serif" font-size="9" text-anchor="middle" fill="#22c55e">1788</text>
</svg>
