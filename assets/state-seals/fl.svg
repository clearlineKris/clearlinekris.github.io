<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
  <!-- Florida State Seal — wireframe -->
  <!-- Outer border rings -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#22c55e" stroke-width="1.5"/>

  <!-- State name arc text (top) -->
  <path id="fl-top-arc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
  <text font-family="serif" font-size="13" fill="#22c55e" letter-spacing="2">
    <textPath href="#fl-top-arc" startOffset="10%">THE GREAT SEAL OF THE</textPath>
  </text>
  <path id="fl-bot-arc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
  <text font-family="serif" font-size="14" fill="#22c55e" letter-spacing="3">
    <textPath href="#fl-bot-arc" startOffset="24%">STATE OF FLORIDA</textPath>
  </text>

  <!-- Sabal Palm (Florida state tree, center-left) -->
  <line x1="86" y1="124" x2="86" y2="86" stroke="#22c55e" stroke-width="1.5"/>
  <path d="M 86,86 Q 78,78 68,82" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 86,86 Q 88,76 98,78" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 86,90 Q 74,88 66,94" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 86,90 Q 98,86 104,90" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <path d="M 86,94 Q 80,100 74,98" fill="none" stroke="#22c55e" stroke-width="1.2"/>

  <!-- Steamship (center-right) -->
  <rect x="104" y="106" width="28" height="12" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="112" y1="96" x2="112" y2="106" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="120" y1="94" x2="120" y2="106" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Smoke -->
  <path d="M 112,96 Q 110,90 113,86" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <path d="M 120,94 Q 118,88 121,84" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Paddle wheel -->
  <circle cx="132" cy="112" r="6" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="132" y1="106" x2="132" y2="118" stroke="#22c55e" stroke-width="0.8"/>
  <line x1="126" y1="112" x2="138" y2="112" stroke="#22c55e" stroke-width="0.8"/>
  <line x1="128" y1="108" x2="136" y2="116" stroke="#22c55e" stroke-width="0.8"/>
  <line x1="128" y1="116" x2="136" y2="108" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Water / coastline -->
  <path d="M 60,120 Q 80,116 100,120 Q 120,124 140,120" fill="none" stroke="#22c55e" stroke-width="1"/>
  <path d="M 64,124 Q 84,120 100,124 Q 116,128 136,124" fill="none" stroke="#22c55e" stroke-width="1"/>

  <!-- Native American woman (Seminole figure, simplified) -->
  <circle cx="122" cy="86" r="5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <line x1="122" y1="91" x2="122" y2="108" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="114" y1="97" x2="130" y2="97" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="122" y1="108" x2="116" y2="118" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="122" y1="108" x2="128" y2="118" stroke="#22c55e" stroke-width="1.2"/>
  <!-- Headdress decoration -->
  <path d="M 118,82 Q 122,76 126,82" fill="none" stroke="#22c55e" stroke-width="0.8"/>
  <line x1="122" y1="76" x2="122" y2="72" stroke="#22c55e" stroke-width="0.8"/>

  <!-- Sun (top right) -->
  <circle cx="136" cy="82" r="8" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <line x1="136" y1="70" x2="136" y2="66" stroke="#22c55e" stroke-width="1"/>
  <line x1="144" y1="74" x2="148" y2="70" stroke="#22c55e" stroke-width="1"/>
  <line x1="148" y1="82" x2="152" y2="82" stroke="#22c55e" stroke-width="1"/>
  <line x1="144" y1="90" x2="148" y2="94" stroke="#22c55e" stroke-width="1"/>
  <line x1="128" y1="74" x2="124" y2="70" stroke="#22c55e" stroke-width="1"/>

  <!-- IN GOD WE TRUST motto -->
  <text x="100" y="148" font-family="serif" font-size="10" text-anchor="middle" fill="#22c55e" letter-spacing="2">IN GOD WE TRUST</text>

  <!-- Year -->
  <text x="100" y="162" font-family="serif" font-size="9" text-anchor="middle" fill="#22c55e">1845</text>
</svg>
